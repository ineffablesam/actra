services:
  actra-backend:
    build: .
    ports:
      - "8765:8765"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
    command: ["python", "-m", "src.main"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - dev

volumes:
  redis-data:
